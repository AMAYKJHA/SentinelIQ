<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>New device signed in</title>
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      background: #f4f4f4;
      font-family: Arial, sans-serif;
    "
  >
    <table width="100%" cellpadding="0" cellspacing="0" border="0">
      <tr>
        <td align="center" style="padding: 40px 20px">
          <table
            width="600"
            cellpadding="0"
            cellspacing="0"
            border="0"
            style="background: #ffffff; border-radius: 8px; padding: 40px"
          >
            <tr>
              <td align="center">
                <h2 style="margin: 0; color: #222">New device signed in</h2>
              </td>
            </tr>
            <tr>
              <td style="padding-top: 20px; color: #555; font-size: 16px">
                Hello {{name}},
              </td>
            </tr>
            <tr>
              <td style="padding-top: 15px; color: #555; font-size: 16px">
                A new device just signed in to your {{app_name}} account.
              </td>
            </tr>
            <tr>
              <td style="padding-top: 25px">
                <table
                  width="100%"
                  cellpadding="10"
                  cellspacing="0"
                  border="0"
                  style="border: 1px solid #e5e5e5; border-collapse: collapse"
                >
                  <tr>
                    <td
                      style="
                        font-weight: bold;
                        border-bottom: 1px solid #e5e5e5;
                        width: 30%;
                      "
                    >
                      Location
                    </td>
                    <td style="border-bottom: 1px solid #e5e5e5">
                      {{city}}, {{country}}{{map_html}}
                    </td>
                  </tr>
                  <tr>
                    <td
                      style="
                        font-weight: bold;
                        border-bottom: 1px solid #e5e5e5;
                      "
                    >
                      Device
                    </td>
                    <td style="border-bottom: 1px solid #e5e5e5">{{device}}</td>
                  </tr>
                  <tr>
                    <td style="font-weight: bold">Time</td>
                    <td>{{login_time}}</td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td style="padding-top: 25px; color: #555; font-size: 16px">
                If this was you, no action is needed.
              </td>
            </tr>
            <tr>
              <td align="center" style="padding-top: 20px">
                <a
                  href="{{wasnt_me_link}}"
                  style="
                    background: #c0392b;
                    color: #ffffff;
                    text-decoration: none;
                    padding: 12px 24px;
                    border-radius: 4px;
                    display: inline-block;
                  "
                >
                  This wasn't me
                </a>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
